name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Set app icon
        run: |
          # Install ImageMagick for icon resizing
          sudo apt-get install -y imagemagick > /dev/null 2>&1

          # Android mipmap sizes
          declare -A SIZES=(
            ["mdpi"]=48
            ["hdpi"]=72
            ["xhdpi"]=96
            ["xxhdpi"]=144
            ["xxxhdpi"]=192
          )

          ICON_SRC="resources/icon.png"
          for density in "${!SIZES[@]}"; do
            size=${SIZES[$density]}
            dir="android/app/src/main/res/mipmap-${density}"
            mkdir -p "$dir"
            convert "$ICON_SRC" -resize ${size}x${size} "$dir/ic_launcher.png"
            convert "$ICON_SRC" -resize ${size}x${size} "$dir/ic_launcher_round.png"
            convert "$ICON_SRC" -resize ${size}x${size} "$dir/ic_launcher_foreground.png"
            echo "  ${density}: ${size}x${size}"
          done
          echo "App icon set successfully"

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1 | tail -50

      - name: Read version from package.json
        id: version
        run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Rename APK with version
        run: |
          APK_SRC=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          cp "$APK_SRC" "Point-HVAC-v${APP_VERSION}.apk"
          echo "APK renamed to: Point-HVAC-v${APP_VERSION}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Point-HVAC-v${{ env.APP_VERSION }}
          path: Point-HVAC-v${{ env.APP_VERSION }}.apk
          retention-days: 30
          if-no-files-found: error
