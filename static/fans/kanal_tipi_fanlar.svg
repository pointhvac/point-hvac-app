<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#d1ecf9"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280"/>
      <stop offset="100%" style="stop-color:#4B5563"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" rx="20" fill="url(#bg)"/>
  <!-- Kanal gövdesi -->
  <rect x="40" y="100" width="220" height="100" rx="8" fill="url(#body)" opacity="0.9"/>
  <rect x="40" y="100" width="220" height="100" rx="8" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Giriş flanşı -->
  <rect x="20" y="90" width="30" height="120" rx="4" fill="#9CA3AF" stroke="#6B7280" stroke-width="1.5"/>
  <!-- Çıkış flanşı -->
  <rect x="250" y="90" width="30" height="120" rx="4" fill="#9CA3AF" stroke="#6B7280" stroke-width="1.5"/>
  <!-- Fan çarkı (ortada) -->
  <circle cx="150" cy="150" r="35" fill="#E5E7EB" stroke="#374151" stroke-width="2"/>
  <circle cx="150" cy="150" r="8" fill="#374151"/>
  <!-- Fan kanatları -->
  <path d="M150 115 Q165 135 150 142" fill="#6B7280" stroke="#374151" stroke-width="1"/>
  <path d="M185 150 Q165 165 158 150" fill="#6B7280" stroke="#374151" stroke-width="1"/>
  <path d="M150 185 Q135 165 150 158" fill="#6B7280" stroke="#374151" stroke-width="1"/>
  <path d="M115 150 Q135 135 142 150" fill="#6B7280" stroke="#374151" stroke-width="1"/>
  <!-- Hava akış okları -->
  <path d="M75 140 L95 150 L75 160" fill="none" stroke="#0066CC" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M205 140 L225 150 L205 160" fill="none" stroke="#0066CC" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Etiket -->
  <text x="150" y="245" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#374151">KANAL TiPi FAN</text>
  <text x="150" y="265" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#6B7280">Duct Type Fan</text>
</svg>