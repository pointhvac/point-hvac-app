<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#d1ecf9"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280"/>
      <stop offset="100%" style="stop-color:#4B5563"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" rx="20" fill="url(#bg)"/>
  <!-- Çatı şapkası -->
  <polygon points="150,60 220,110 80,110" fill="#9CA3AF" stroke="#374151" stroke-width="2"/>
  <!-- Çatı şapka detay -->
  <line x1="150" y1="60" x2="150" y2="50" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <!-- Fan gövdesi (silindirik) -->
  <rect x="90" y="110" width="120" height="90" rx="6" fill="url(#body)" stroke="#374151" stroke-width="2"/>
  <!-- Motor bölümü -->
  <rect x="110" y="115" width="80" height="35" rx="4" fill="#4B5563" stroke="#374151" stroke-width="1.5"/>
  <!-- Fan çarkı -->
  <circle cx="150" cy="175" r="25" fill="#E5E7EB" stroke="#374151" stroke-width="2"/>
  <circle cx="150" cy="175" r="6" fill="#374151"/>
  <!-- Fan kanatları -->
  <path d="M150 150 Q160 162 150 168" fill="#6B7280" stroke="#374151" stroke-width="1"/>
  <path d="M175 175 Q163 183 157 175" fill="#6B7280" stroke="#374151" stroke-width="1"/>
  <path d="M150 200 Q140 188 150 182" fill="#6B7280" stroke="#374151" stroke-width="1"/>
  <path d="M125 175 Q137 167 143 175" fill="#6B7280" stroke="#374151" stroke-width="1"/>
  <!-- Taban flanşı -->
  <rect x="80" y="200" width="140" height="15" rx="3" fill="#9CA3AF" stroke="#6B7280" stroke-width="1.5"/>
  <!-- Hava akış okları (yukarı) -->
  <path d="M140 80 L150 65 L160 80" fill="none" stroke="#0066CC" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M130 90 L150 70 L170 90" fill="none" stroke="#0066CC" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Etiket -->
  <text x="150" y="245" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#374151">CATI TiPi FAN</text>
  <text x="150" y="265" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#6B7280">Roof Type Fan</text>
</svg>