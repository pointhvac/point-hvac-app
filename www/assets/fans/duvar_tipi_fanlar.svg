<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#d1ecf9"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280"/>
      <stop offset="100%" style="stop-color:#4B5563"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" rx="20" fill="url(#bg)"/>
  <!-- Duvar -->
  <rect x="30" y="40" width="30" height="220" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="30" y1="80" x2="60" y2="80" stroke="#9CA3AF" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="120" x2="60" y2="120" stroke="#9CA3AF" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="160" x2="60" y2="160" stroke="#9CA3AF" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="200" x2="60" y2="200" stroke="#9CA3AF" stroke-width="1" opacity="0.5"/>
  <!-- Fan çerçevesi (kare) -->
  <rect x="60" y="80" width="140" height="140" rx="8" fill="url(#body)" opacity="0.9" stroke="#374151" stroke-width="2"/>
  <!-- Koruma ızgarası (daire) -->
  <circle cx="130" cy="150" r="55" fill="#E5E7EB" stroke="#374151" stroke-width="2"/>
  <!-- Izgara çizgileri -->
  <line x1="75" y1="150" x2="185" y2="150" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="130" y1="95" x2="130" y2="205" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="91" y1="103" x2="169" y2="197" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="169" y1="103" x2="91" y2="197" stroke="#9CA3AF" stroke-width="1"/>
  <!-- Fan merkezi -->
  <circle cx="130" cy="150" r="12" fill="#374151"/>
  <circle cx="130" cy="150" r="5" fill="#9CA3AF"/>
  <!-- Aksiyel kanatlar -->
  <path d="M130 110 Q145 130 130 138" fill="#4B5563" stroke="#374151" stroke-width="1.5"/>
  <path d="M170 150 Q150 165 142 150" fill="#4B5563" stroke="#374151" stroke-width="1.5"/>
  <path d="M130 190 Q115 170 130 162" fill="#4B5563" stroke="#374151" stroke-width="1.5"/>
  <path d="M90 150 Q110 135 118 150" fill="#4B5563" stroke="#374151" stroke-width="1.5"/>
  <!-- Hava akış okları -->
  <path d="M210 140 L230 150 L210 160" fill="none" stroke="#0066CC" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M230 140 L250 150 L230 160" fill="none" stroke="#0066CC" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Etiket -->
  <text x="150" y="250" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#374151">DUVAR TiPi FAN</text>
  <text x="150" y="270" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#6B7280">Wall Mount Fan</text>
</svg>