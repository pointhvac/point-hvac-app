<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <title>DIA Listesi - Point HVAC</title>
  <link rel="icon" type="image/x-icon" href="../assets/logos/yeni_icon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .dia-item {
      background: rgba(255,255,255,.97);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      position: relative;
      box-shadow: var(--shadow);
      animation: fadeInUp .3s ease;
    }
    .dia-item .dia-modul {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--primary); margin-bottom: 4px;
    }
    .dia-item .dia-model {
      font-size: 1.1rem; font-weight: 800; color: var(--dark); margin-bottom: 2px;
    }
    .dia-item .dia-kategori {
      font-size: .78rem; color: var(--gray-400); margin-bottom: 8px;
    }
    .dia-item .dia-specs {
      display: flex; flex-wrap: wrap; gap: 8px 16px;
      font-size: .82rem; color: var(--gray-600);
    }
    .dia-item .dia-price {
      font-size: 1rem; font-weight: 800; color: var(--primary);
      margin-top: 8px;
    }
    .dia-item .dia-delete {
      position: absolute; top: 12px; right: 12px;
      width: 28px; height: 28px; border-radius: 50%;
      border: none; background: var(--gray-100); color: var(--danger);
      font-size: 1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: .2s;
    }
    .dia-item .dia-delete:active { background: var(--danger); color: #fff; }

    /* Ozel tema */
    [data-theme="ozel"] .dia-item { background: #1a2035; border: 1px solid #2a3348; }
    [data-theme="ozel"] .dia-model { color: #e8ecf4; }
    [data-theme="ozel"] .dia-kategori { color: #7a8599; }
    [data-theme="ozel"] .dia-specs { color: #8892a8; }
    [data-theme="ozel"] .dia-delete { background: #1e2538; }

    [data-theme="doga"] .dia-item { background: rgba(27,46,27,.85); border: 1px solid rgba(76,175,80,.25); }
    [data-theme="doga"] .dia-model { color: #E8F5E9; }
    [data-theme="doga"] .dia-kategori { color: #81C784; }
    [data-theme="doga"] .dia-specs { color: #A5D6A7; }
    [data-theme="doga"] .dia-price { color: #8BC34A; }
    [data-theme="doga"] .dia-delete { background: rgba(15,31,15,.7); }

    .summary-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px; background: rgba(255,255,255,.97);
      border-radius: var(--radius); box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .summary-count { font-size: .88rem; font-weight: 600; color: var(--gray-600); }
    .summary-total { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
    [data-theme="ozel"] .summary-bar { background: #1a2035; border: 1px solid #2a3348; }
    [data-theme="ozel"] .summary-count { color: #8892a8; }
    [data-theme="ozel"] .summary-total { color: #7eb8da; }
    [data-theme="doga"] .summary-bar { background: rgba(27,46,27,.85); border: 1px solid rgba(76,175,80,.25); }
    [data-theme="doga"] .summary-count { color: #A5D6A7; }
    [data-theme="doga"] .summary-total { color: #8BC34A; }

    .action-bar { display: flex; gap: 8px; margin-bottom: 12px; }

    /* Doviz secim bari */
    .currency-bar {
      display: flex; align-items: center; gap: 4px;
      margin-bottom: 12px; padding: 4px;
      background: var(--gray-100); border-radius: var(--radius-sm);
    }
    .currency-btn {
      padding: 6px 14px; border: none; border-radius: 8px;
      background: transparent; color: var(--gray-600);
      font-size: .82rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: .2s;
    }
    .currency-btn.active {
      background: #fff; color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .currency-rate {
      margin-left: auto; font-size: .72rem;
      color: var(--gray-400); font-weight: 500;
      white-space: nowrap;
    }
    [data-theme="ozel"] .currency-bar { background: #141a2a; }
    [data-theme="ozel"] .currency-btn { color: #7a8599; }
    [data-theme="ozel"] .currency-btn.active { background: #1a2035; color: #7eb8da; }
    [data-theme="ozel"] .currency-rate { color: #5a6678; }
    [data-theme="doga"] .currency-bar { background: rgba(15,31,15,.5); }
    [data-theme="doga"] .currency-btn { color: #81C784; }
    [data-theme="doga"] .currency-btn.active { background: rgba(27,46,27,.85); color: #8BC34A; }
    [data-theme="doga"] .currency-rate { color: rgba(165,214,167,.4); }
  </style>
</head>
<body>

  <div class="container">
    <a href="../index.html" class="back-btn" onclick="event.preventDefault(); history.back();">&#8592; Ana Sayfa</a>

    <div class="header" style="margin-bottom:20px">
      <div class="header-left">
        <div>
          <h1>&#128722; DIA Listesi</h1>
          <div class="subtitle">Secilen tum urunler</div>
        </div>
      </div>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()"><span class="theme-icon">&#9684;</span></button>
      </div>
    </div>

    <!-- Ozet -->
    <div class="summary-bar" id="summaryBar">
      <span class="summary-count" id="summaryCount">0 urun</span>
      <span class="summary-total" id="summaryTotal">0,00 EUR</span>
    </div>

    <!-- Aksiyon butonlari -->
    <div class="action-bar">
      <button class="btn btn-success btn-sm" style="flex:1" onclick="doPdfExport()">&#128196; PDF Teklif</button>
      <button class="btn btn-primary btn-sm" style="flex:1" onclick="doExport()">&#128202; Excel</button>
      <button class="btn btn-secondary btn-sm" style="flex:1" onclick="doClipboard()">&#128203; Kopyala</button>
      <button class="btn btn-danger btn-sm" onclick="doClearAll()">&#128465;</button>
    </div>

    <!-- Doviz secimi -->
    <div class="currency-bar" id="currencyBar">
      <button class="currency-btn active" data-cur="EUR" onclick="setCurrency('EUR')">EUR (&euro;)</button>
      <button class="currency-btn" data-cur="TRY" onclick="setCurrency('TRY')">TL (&#8378;)</button>
      <button class="currency-btn" data-cur="USD" onclick="setCurrency('USD')">USD ($)</button>
      <span class="currency-rate" id="currencyRate">Kur yukleniyor...</span>
    </div>

    <!-- Liste -->
    <div id="listContainer"></div>

    <!-- Bos durum -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">&#128722;</div>
      <div class="text">DIA listesi bos.<br>Modullerden urun ekleyerek baslayin.</div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/export.js"></script>
  <script src="../js/currency.js"></script>
  <script src="../js/pdf-export.js"></script>
  <script>
    // Tema
    function toggleTheme(){const h=document.documentElement,c=h.getAttribute('data-theme');let n;if(!c||c==='light')n='ozel';else if(c==='ozel')n='doga';else n='light';h.setAttribute('data-theme',n);setSetting('theme',n);const b=document.querySelector('.theme-icon');if(b){if(n==='ozel')b.innerHTML='&#127807;';else if(n==='doga')b.innerHTML='&#9728;';else b.innerHTML='&#9684;';}}
    (function(){const s=getSetting('theme','light');document.documentElement.setAttribute('data-theme',s);setTimeout(()=>{const b=document.querySelector('.theme-icon');if(b){if(s==='ozel')b.innerHTML='&#127807;';else if(s==='doga')b.innerHTML='&#9728;';else b.innerHTML='&#9684;';}},30);})();

    const MODUL_LABELS = { fan:'Fan', santral:'Santral', hucreli:'Hucreli', cihaz:'Cihaz', aksa:'AKSA' };

    function renderList() {
      const list = App.getDIAList();
      const container = document.getElementById('listContainer');
      const empty = document.getElementById('emptyState');

      if (!list.length) {
        container.innerHTML = '';
        empty.style.display = '';
        updateSummary(list);
        return;
      }
      empty.style.display = 'none';

      let html = '';
      for (const item of list) {
        html += '<div class="dia-item" data-id="' + item.id + '">';
        html += '<button class="dia-delete" onclick="deleteItem(\'' + item.id + '\')" title="Sil">&times;</button>';
        html += '<div class="dia-modul">' + (MODUL_LABELS[item.modul] || item.modul || '-') + '</div>';
        html += '<div class="dia-model">' + (item.model || '-') + '</div>';
        html += '<div class="dia-kategori">' + (item.kategori || '') + '</div>';
        html += '<div class="dia-specs">';
        if (item.debi) html += '<span>Debi: ' + formatNumber(item.debi) + '</span>';
        if (item.basinc) html += '<span>Basinc: ' + formatNumber(item.basinc) + ' Pa</span>';
        if (item.motorGucu) html += '<span>Motor: ' + item.motorGucu + ' kW</span>';
        if (item.voltaj) html += '<span>Voltaj: ' + item.voltaj + '</span>';
        if (item.iskonto) html += '<span>Isk: %' + item.iskonto + '</span>';
        html += '</div>';
        const price = item.netFiyat || item.fiyat || 0;
        if (price) html += '<div class="dia-price">' + formatCurrency(price) + '</div>';
        html += '</div>';
      }
      container.innerHTML = html;
      updateSummary(list);
    }

    function updateSummary(list) {
      const count = list.length;
      const total = list.reduce((sum, i) => sum + (i.netFiyat || i.fiyat || 0), 0);
      document.getElementById('summaryCount').textContent = count + ' urun';
      document.getElementById('summaryTotal').textContent = formatCurrency(total);
    }

    function deleteItem(id) {
      App.removeFromDIA(id);
      renderList();
    }

    function doClearAll() {
      if (!confirm('Tum listeyi silmek istediginize emin misiniz?')) return;
      App.clearDIAList();
      renderList();
      App.showToast('Liste temizlendi', '');
    }

    async function doExport() {
      const list = App.getDIAList();
      await ExcelExport.exportDIA(list);
    }

    function doClipboard() {
      const list = App.getDIAList();
      if (!list.length) { App.showToast('Liste bos', 'error'); return; }

      let text = 'POINT HVAC - DIA LISTESI\n';
      text += '========================\n\n';

      let total = 0;
      list.forEach((item, i) => {
        const price = item.netFiyat || item.fiyat || 0;
        total += price;
        text += (i + 1) + '. ' + (MODUL_LABELS[item.modul] || '') + ' - ' + (item.model || '-');
        if (item.kategori) text += ' (' + item.kategori + ')';
        text += '\n';
        if (item.debi) text += '   Debi: ' + item.debi + ' m3/h';
        if (item.basinc) text += '  |  Basinc: ' + item.basinc + ' Pa';
        text += '\n';
        text += '   Fiyat: ' + formatCurrency(price) + '\n\n';
      });

      text += '------------------------\n';
      text += 'TOPLAM: ' + formatCurrency(total) + '\n';

      navigator.clipboard.writeText(text).then(() => {
        App.showToast('Panoya kopyalandi', 'success');
      }).catch(() => {
        App.showToast('Kopyalama basarisiz', 'error');
      });
    }

    // ===== DOVIZ KURU =====
    CurrencyManager.init();
    CurrencyManager.onChange(function() {
      renderList();
      updateCurrencyUI();
    });

    function setCurrency(cur) {
      CurrencyManager.setActiveCurrency(cur);
      document.querySelectorAll('.currency-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.cur === cur);
      });
      renderList();
      updateCurrencyUI();
    }

    function updateCurrencyUI() {
      var rates = CurrencyManager.getRates();
      var el = document.getElementById('currencyRate');
      if (!el) return;
      if (CurrencyManager.hasRates()) {
        el.textContent = '1\u20AC = ' + rates.TRY.toFixed(2) + ' TL | ' + rates.USD.toFixed(4) + ' $';
      } else {
        el.textContent = 'Kur bilgisi alinamadi';
      }
      // Aktif butonu isaretle
      var cur = CurrencyManager.getActiveCurrency();
      document.querySelectorAll('.currency-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.cur === cur);
      });
    }

    // ===== PDF EXPORT =====
    async function doPdfExport() {
      var list = App.getDIAList();
      await PdfExport.exportDIA(list);
    }

    // Baslat
    updateCurrencyUI();
    renderList();
  </script>
</body>
</html>
