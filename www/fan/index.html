<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <title>Fan Secimi - Point HVAC</title>
  <link rel="icon" type="image/x-icon" href="../assets/logos/yeni_icon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    /* Fan modulu ozel stiller */
    .fan-form { display: grid; gap: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) {
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
    }

    /* Filtre toggle */
    .filter-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; cursor: pointer;
      font-size: .85rem; font-weight: 600;
      color: var(--gray-600);
      border: none; background: none;
      font-family: inherit;
    }
    .filter-toggle .arrow { transition: transform .2s; }
    .filter-toggle.open .arrow { transform: rotate(90deg); }
    .filter-section { display: none; }
    .filter-section.open { display: block; }

    /* Sonuc karti */
    .fan-result {
      animation: fadeInUp .4s ease;
    }
    .fan-result .model-name {
      font-size: 1.5rem; font-weight: 800;
      color: var(--secondary); margin-bottom: 4px;
    }
    .fan-result .tolerance-badge {
      display: inline-block;
      padding: 2px 10px; border-radius: 6px;
      font-size: .72rem; font-weight: 700;
      background: rgba(255,183,3,.2); color: #FFB703;
    }
    .fan-result .warning-text {
      font-size: .82rem; color: #FFB703;
      margin-top: 8px; font-style: italic;
    }

    /* Fan gorseli */
    .fan-image-wrap {
      text-align: center; margin-bottom: 16px;
    }
    .fan-image-wrap img {
      max-width: 180px; max-height: 180px;
      object-fit: contain;
      border-radius: 12px;
    }

    /* Aday tablosu */
    .candidates-section { margin-top: 16px; }
    .candidate-row { cursor: pointer; transition: background .15s ease; }
    .candidate-row:hover { background: rgba(0,102,204,.06); }
    .candidate-row:active { background: rgba(0,102,204,.14); }
    .candidate-row.selected-exact { background: rgba(0,102,204,.08); }
    .candidate-row.selected-tolerance { background: rgba(255,183,3,.08); }
    .candidate-row.selected-exact:hover { background: rgba(0,102,204,.14); }
    .candidate-row.selected-tolerance:hover { background: rgba(255,183,3,.14); }
    [data-theme="ozel"] .candidate-row:hover { background: rgba(0,180,216,.10); }
    [data-theme="doga"] .candidate-row:hover { background: rgba(76,175,80,.10); }
    .candidate-row .tag {
      display: inline-block; padding: 1px 8px;
      border-radius: 4px; font-size: .7rem; font-weight: 700;
    }
    .tag-exact { background: rgba(6,214,160,.15); color: #049a73; }
    .tag-tolerance { background: rgba(255,183,3,.15); color: #e6a300; }

    /* DIA ekleme butonu */
    .add-dia-btn {
      display: flex; align-items: center; gap: 6px;
      margin-top: 12px;
    }

    /* ============ KATEGORI SECIMI (Migros tarzi grid) ============ */
    .cat-breadcrumb {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 6px; font-size: .82rem; font-weight: 600;
      color: var(--gray-600); margin-bottom: 14px;
    }
    .cat-breadcrumb .crumb {
      cursor: pointer; padding: 4px 10px;
      border-radius: 8px; background: rgba(0,102,204,.06);
      color: var(--primary); transition: all .15s;
      border: 1px solid transparent;
    }
    .cat-breadcrumb .crumb:hover {
      background: rgba(0,102,204,.12);
      border-color: rgba(0,102,204,.2);
    }
    .cat-breadcrumb .sep { opacity: .5; font-size: .9rem; }
    .cat-breadcrumb .current {
      padding: 4px 10px; color: var(--gray-700);
      font-weight: 700;
    }
    [data-theme="ozel"] .cat-breadcrumb { color: #8a96a8; }
    [data-theme="ozel"] .cat-breadcrumb .crumb {
      background: rgba(0,180,216,.08); color: var(--secondary);
    }
    [data-theme="ozel"] .cat-breadcrumb .current { color: #d8dee9; }
    [data-theme="doga"] .cat-breadcrumb .crumb {
      background: rgba(76,175,80,.1); color: #4CAF50;
    }
    [data-theme="doga"] .cat-breadcrumb .current { color: #2E7D32; }

    /* Grid ortak */
    .cat-grid {
      display: grid; gap: 12px;
      grid-template-columns: repeat(2, 1fr);
    }
    @media (min-width: 600px) { .cat-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; } }
    @media (min-width: 900px) { .cat-grid { grid-template-columns: repeat(4, 1fr); } }

    /* Kart */
    .cat-card {
      position: relative;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 14px 10px 12px;
      background: var(--card-bg, #fff);
      border: 1.5px solid var(--input-border, #E5E7EB);
      border-radius: 16px;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      overflow: hidden;
      min-height: 150px;
    }
    .cat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 24px rgba(0,102,204,.12);
      border-color: var(--primary);
    }
    .cat-card:active { transform: translateY(-1px) scale(.98); }
    .cat-card .img-wrap {
      width: 100%; height: 90px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
      background: linear-gradient(135deg, rgba(0,102,204,.04), rgba(0,180,216,.06));
      border-radius: 12px;
    }
    .cat-card .img-wrap img {
      max-width: 95%; max-height: 95%;
      object-fit: contain;
    }
    .cat-card .name {
      font-size: .78rem; font-weight: 700;
      color: var(--card-text, #1A1A2E);
      text-align: center;
      line-height: 1.25;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .cat-card .badge-count {
      position: absolute; top: 8px; right: 8px;
      background: var(--primary); color: #fff;
      font-size: .62rem; font-weight: 800;
      padding: 3px 8px; border-radius: 999px;
      box-shadow: 0 2px 6px rgba(0,102,204,.3);
    }

    /* Grup karti varyantlari (renk) - renkli AI gorseller icin yumusak pastel arkaplan */
    .cat-card.group-card .img-wrap {
      background: linear-gradient(135deg,
                    color-mix(in srgb, var(--g-c1, #0066CC) 12%, #fff),
                    color-mix(in srgb, var(--g-c2, #00B4D8) 18%, #fff));
      padding: 6px;
      height: 110px;
    }
    .cat-card.group-card .img-wrap img {
      max-width: 100%;
      max-height: 100%;
    }
    .cat-card.group-card[data-group="kanal"]  { --g-c1:#0066CC; --g-c2:#00B4D8; }
    .cat-card.group-card[data-group="cati"]   { --g-c1:#FF6B35; --g-c2:#FFB703; }
    .cat-card.group-card[data-group="basinc"] { --g-c1:#EF476F; --g-c2:#FF6B6B; }
    .cat-card.group-card[data-group="duman"]  { --g-c1:#7B2FF7; --g-c2:#C77DFF; }
    .cat-card.group-card[data-group="duvar"]  { --g-c1:#06D6A0; --g-c2:#00C853; }
    .cat-card.group-card {
      border-color: color-mix(in srgb, var(--g-c1, #0066CC) 25%, #E5E7EB);
    }
    .cat-card.group-card:hover {
      border-color: var(--g-c1, var(--primary));
      box-shadow: 0 12px 28px color-mix(in srgb, var(--g-c1, #0066CC) 25%, transparent);
    }
    .cat-card.group-card .name {
      color: var(--g-c1, var(--card-text));
    }
    .cat-card.group-card .badge-count {
      background: var(--g-c1);
      color: #fff;
      box-shadow: 0 2px 6px color-mix(in srgb, var(--g-c1) 40%, transparent);
    }
    [data-theme="ozel"] .cat-card.group-card {
      background: #1a2035;
    }
    [data-theme="ozel"] .cat-card.group-card .img-wrap {
      background: linear-gradient(135deg,
                    color-mix(in srgb, var(--g-c1) 18%, #0e1424),
                    color-mix(in srgb, var(--g-c2) 22%, #0e1424));
    }
    [data-theme="ozel"] .cat-card.group-card .name {
      color: color-mix(in srgb, var(--g-c2) 60%, #ffffff);
    }

    /* Dark tema uyumlulugu */
    [data-theme="ozel"] .cat-card {
      background: #1a2035;
      border-color: #2d3a50;
    }
    [data-theme="ozel"] .cat-card .name { color: #d8dee9; }
    [data-theme="ozel"] .cat-card .img-wrap {
      background: linear-gradient(135deg, rgba(0,180,216,.08), rgba(123,47,247,.08));
    }
    [data-theme="ozel"] .cat-card:hover {
      box-shadow: 0 10px 24px rgba(0,180,216,.2);
      border-color: var(--secondary);
    }

    [data-theme="doga"] .cat-card {
      background: #ffffff;
      border-color: rgba(76,175,80,.25);
    }
    [data-theme="doga"] .cat-card .img-wrap {
      background: linear-gradient(135deg, rgba(76,175,80,.08), rgba(129,199,132,.12));
    }
    [data-theme="doga"] .cat-card:hover {
      box-shadow: 0 10px 24px rgba(76,175,80,.2);
      border-color: #4CAF50;
    }

    /* Grup basligi (model listeleme ekraninda) */
    .cat-stage-title {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .cat-stage-title .icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.1rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
    }
    .cat-stage-title .txt {
      font-size: 1rem; font-weight: 800;
      color: var(--card-text, #1A1A2E);
    }
    [data-theme="ozel"] .cat-stage-title .txt { color: #e6ecf5; }

    /* Stage gecisleri */
    .cat-stage { animation: fadeInUp .3s ease; }
  </style>
</head>
<body>

  <div class="container">
    <!-- Geri butonu -->
    <a href="../index.html" class="back-btn" onclick="event.preventDefault(); App.goBack();">&#8592; Ana Sayfa</a>

    <!-- Baslik -->
    <div class="header" style="margin-bottom:20px">
      <div class="header-left">
        <div>
          <h1>&#127744; Fan Secimi</h1>
          <div class="subtitle">Debi ve basinc ile en uygun fan modeli</div>
        </div>
      </div>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()" title="Tema Degistir">
          <span class="theme-icon">&#9684;</span>
        </button>
      </div>
    </div>

    <!-- Kategori Secimi (3 asamali: Grup -> Model -> Form) -->
    <div class="card" id="categoryCard">
      <div class="card-title">Fan Kategorisi</div>

      <!-- Yukleniyor -->
      <div id="categoryLoading" style="text-align:center;padding:20px;color:var(--gray-400)">
        <div class="spinner spinner-dark"></div>
        <div style="margin-top:8px;font-size:.85rem">Kategoriler yukleniyor...</div>
      </div>

      <!-- Breadcrumb -->
      <div class="cat-breadcrumb" id="catBreadcrumb" style="display:none"></div>

      <!-- ASAMA 1: 5 Ana Grup -->
      <div class="cat-stage" id="stageGroups" style="display:none">
        <div class="cat-grid" id="groupGrid"></div>
      </div>

      <!-- ASAMA 2: Secilen Grubun Modelleri -->
      <div class="cat-stage" id="stageModels" style="display:none">
        <div class="cat-grid" id="modelGrid"></div>
      </div>

      <!-- ASAMA 3: Secilen Model (kompakt gosterim) -->
      <div class="cat-stage" id="stageSelected" style="display:none">
        <div class="cat-stage-title">
          <div class="icon">&#9989;</div>
          <div class="txt" id="selectedModelName">-</div>
        </div>
      </div>
    </div>

    <!-- Secim Formu -->
    <div class="card" id="formCard" style="display:none">
      <div class="card-title">Secim Kriterleri</div>
      <div class="fan-form">
        <!-- Ana parametreler -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Debi (m&sup3;/h)</label>
            <input type="number" id="inputDebi" class="form-input" step="0.01" placeholder="Orn: 8000" inputmode="decimal">
          </div>
          <div class="form-group">
            <label class="form-label">Basinc (Pa)</label>
            <input type="number" id="inputBasinc" class="form-input" step="1" placeholder="Orn: 250" inputmode="numeric">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Iskonto (%)</label>
            <input type="number" id="inputIskonto" class="form-input" value="50" min="0" max="100" inputmode="numeric">
          </div>
          <div class="form-group" style="display:flex;align-items:flex-end;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.85rem;color:var(--gray-600)">
              <input type="checkbox" id="inputTolerans" checked style="width:18px;height:18px">
              %10 Tolerans
            </label>
          </div>
        </div>

        <!-- Gelismis filtreler (gizli) -->
        <button class="filter-toggle" id="filterToggle" onclick="toggleFilters()">
          <span class="arrow">&#9654;</span> Gelismis Filtreler
        </button>
        <div class="filter-section" id="filterSection">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Motor Gucu Min (kW)</label>
              <input type="number" id="filterMotorMin" class="form-input" step="0.01" placeholder="Min" inputmode="decimal">
            </div>
            <div class="form-group">
              <label class="form-label">Motor Gucu Max (kW)</label>
              <input type="number" id="filterMotorMax" class="form-input" step="0.01" placeholder="Max" inputmode="decimal">
            </div>
          </div>
          <div class="form-row-3">
            <div class="form-group">
              <label class="form-label">Voltaj</label>
              <select id="filterVoltaj" class="form-select">
                <option value="">Tumu</option>
                <option value="220">220V</option>
                <option value="380">380V</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Ses Min (dB)</label>
              <input type="number" id="filterSesMin" class="form-input" step="1" placeholder="Min" inputmode="numeric">
            </div>
            <div class="form-group">
              <label class="form-label">Ses Max (dB)</label>
              <input type="number" id="filterSesMax" class="form-input" step="1" placeholder="Max" inputmode="numeric">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Devir Min (RPM)</label>
              <input type="number" id="filterDevirMin" class="form-input" step="1" placeholder="Min" inputmode="numeric">
            </div>
            <div class="form-group">
              <label class="form-label">Devir Max (RPM)</label>
              <input type="number" id="filterDevirMax" class="form-input" step="1" placeholder="Max" inputmode="numeric">
            </div>
          </div>
        </div>

        <!-- Secim butonu -->
        <button class="btn btn-primary btn-block" id="btnSelect" onclick="doSelectFan()">
          Fan Sec
        </button>
      </div>
    </div>

    <!-- Sonuc -->
    <div id="resultSection" style="display:none">
      <!-- Sonuc Paneli -->
      <div class="result-panel fan-result" id="resultPanel"></div>

      <!-- DIA'ya ekle -->
      <div class="add-dia-btn">
        <button class="btn btn-success btn-block btn-sm" id="btnAddDIA" onclick="addResultToDIA()">
          &#128722; DIA Listesine Ekle
        </button>
      </div>

      <!-- Aday Tablosu -->
      <div class="candidates-section" id="candidatesSection" style="display:none">
        <div class="card" style="padding:16px">
          <div class="card-title" style="font-size:.95rem">Tum Uygun Modeller</div>
          <div class="table-wrap">
            <table class="table" id="candidatesTable">
              <thead>
                <tr>
                  <th>Model</th>
                  <th>Debi</th>
                  <th>Fiyat</th>
                  <th>Motor</th>
                  <th>Durum</th>
                </tr>
              </thead>
              <tbody id="candidatesBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- DIA Badge -->
  <a href="../dia/index.html" class="dia-badge" style="display:none">
    &#128722;
    <span class="count">0</span>
  </a>

  <!-- Scripts -->
  <script src="../js/lib/supabase.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/data-loader.js"></script>
  <script src="../js/price-calc.js"></script>
  <script src="../js/fan-selector.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/back-button.js"></script>
  <script>
    // ===== TEMA (tum sayfalarda paylasilan) =====
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      let next;
      if (!current || current === 'light') next = 'ozel';
      else if (current === 'ozel') next = 'doga';
      else next = 'light';
      html.setAttribute('data-theme', next);
      setSetting('theme', next);
      const btn = document.querySelector('.theme-icon');
      if (btn) {
        if (next === 'ozel') btn.innerHTML = '&#127807;';
        else if (next === 'doga') btn.innerHTML = '&#9728;';
        else btn.innerHTML = '&#9684;';
      }
    }
    (function() {
      const saved = getSetting('theme', 'light');
      document.documentElement.setAttribute('data-theme', saved);
      setTimeout(() => {
        const btn = document.querySelector('.theme-icon');
        if (btn) {
          if (saved === 'ozel') btn.innerHTML = '&#127807;';
          else if (saved === 'doga') btn.innerHTML = '&#9728;';
          else btn.innerHTML = '&#9684;';
        }
      }, 30);
    })();

    // ===== DURUM =====
    let _fanIndex = null;     // Sheet listesi
    let _activeSheet = null;  // Aktif sheet verisi
    let _activeSheetName = '';
    let _activePrices = null; // Aktif fiyat verisi (sheet'e uygun)
    let _allPrices = null;    // Tum fiyat verileri
    let _lastResult = null;   // Son secim sonucu
    let _lastCandidates = []; // Son aday listesi

    // ===== GRUP TANIMLARI (referans projeden) =====
    const SHEET_GROUPS = {
      "Kanal Tipi Fanlar": [
        "Kanal Tipi Yuvarlak Fanlar",
        "Kanal Tipi Dikdörtgen Fanlar",
        "Harici Motorlu Dikdörtgen Fan M",
        "Harici Motorlu Dikdörtgen Fan T",
        "Harici Motorlu Ex-Proof Fanlar",
        "Kanal Tipi Dikdörtgen EC Fanlar"
      ],
      "Çatı Tipi Fanlar": [
        "Rad.Yat. Çatı Tipi Fan",
        "Rad.Yat. Dıştan Çatı Tipi Fan M",
        "Rad.Yat. Dıştan Çatı Tipi Fan T",
        "Rad. Ex. Dıştan Çatı Tipi Fan T",
        "Rad.Dik. Çatı Tipi Fan",
        "Rad.Dik. Dıştan Çatı Tipi Fan M",
        "Rad.Dik. Dıştan Çatı Tipi Fan T",
        "Rad.Yat. Çatı Tipi Fan EC",
        "Rad.Dik. Çatı Tipi Fan EC",
        " Aksiyel Çatı Tipi Fan"
      ],
      "Basınçlandırma Fanları": [
        "Basınçlandırma Fanları",
        "Basınçlandırma Fanları Çatı Tip",
        "Basınçlandırma Fanları Hücreli",
        "Basınçlandırma Fanları EX",
        "Basınçlandırma Fanları EX Çatı",
        "Basınçlandırma Fanları EX Hücre"
      ],
      "Duman Tahliye Fanları": [
        "Duman Tahliye Fanları",
        "Duman Tahliye Fanları Çatı Tip",
        "Duman Tahliye Fanları Hücreli",
        "Duman Tahliye Fanları F400",
        "Duman Tahliye Fanları Çatı F400",
        "Duman Tahliye Fanları HücreF400"
      ],
      "Duvar Tipi Fanlar": [
        "Duvar Tipi Aksiyal Fan",
        "Duvar Tipi Aksiyel Fan EX"
      ]
    };
    const SHEET_GROUP_ORDER = [
      "Kanal Tipi Fanlar",
      "Çatı Tipi Fanlar",
      "Basınçlandırma Fanları",
      "Duman Tahliye Fanları",
      "Duvar Tipi Fanlar"
    ];
    const GROUP_META = {
      "Kanal Tipi Fanlar":      { key: "kanal",  img: "kanal_tipi_fanlar.png" },
      "Çatı Tipi Fanlar":       { key: "cati",   img: "cati_tipi_fanlar.png" },
      "Basınçlandırma Fanları": { key: "basinc", img: "basinclandirma_fanlari.png" },
      "Duman Tahliye Fanları":  { key: "duman",  img: "duman_tahliye_fanlari.png" },
      "Duvar Tipi Fanlar":      { key: "duvar",  img: "duvar_tipi_fanlar.png" }
    };

    // Sheet adi -> dosya adi (Python _sheet_to_filename portu)
    function sheetToFilename(sheetName) {
      const trMap = { 'ç':'c','ğ':'g','ı':'i','ö':'o','ş':'s','ü':'u',
                      'Ç':'C','Ğ':'G','İ':'I','Ö':'O','Ş':'S','Ü':'U',' ':'_' };
      let name = sheetName.trim().split('').map(c => trMap[c] !== undefined ? trMap[c] : c).join('').toLowerCase();
      // sadece harf/rakam/_ birak
      name = name.split('').filter(c => /[a-z0-9_]/.test(c)).join('');
      // coklu _ teke dusur
      while (name.indexOf('__') !== -1) name = name.replace(/__/g, '_');
      return name.replace(/^_+|_+$/g, '');
    }

    // Sheet -> gorsel dosya adi (uzantilarla dene)
    const FAN_IMG_EXT = ['png', 'jpg', 'jpeg', 'webp', 'svg'];
    function getFanImageUrl(sheetName) {
      const base = sheetToFilename(sheetName);
      // Hangi uzantilar mevcut, bilmedigimiz icin <img onerror> ile fallback yapacagiz.
      // Varsayilan olarak .png dene; yoksa default.svg.
      return '../assets/fans/' + base + '.png';
    }

    // ===== SAYFA BASLATMA =====
    async function init() {
      try {
        _fanIndex = await DataLoader.loadFanIndex();
        _allPrices = await DataLoader.loadFanPrices();

        renderGroupStage();
        App.updateDIABadge();
      } catch (err) {
        document.getElementById('categoryLoading').innerHTML =
          '<div style="color:var(--danger)">Veri yuklenemedi: ' + err.message + '</div>';
      }
    }

    // Sheet adina gore _fanIndex.sheets icinden bul
    function findSheetByName(name) {
      if (!_fanIndex || !_fanIndex.sheets) return null;
      return _fanIndex.sheets.find(s => s.name === name) || null;
    }

    // ===== ASAMA 1: GRUP GRID =====
    function renderGroupStage() {
      document.getElementById('categoryLoading').style.display = 'none';
      document.getElementById('formCard').style.display = 'none';
      document.getElementById('resultSection').style.display = 'none';
      document.getElementById('stageModels').style.display = 'none';
      document.getElementById('stageSelected').style.display = 'none';
      document.getElementById('stageGroups').style.display = '';

      // Breadcrumb
      const bc = document.getElementById('catBreadcrumb');
      bc.style.display = '';
      bc.innerHTML = '<span class="current">&#128193; Tum Kategoriler</span>';

      const grid = document.getElementById('groupGrid');
      let html = '';
      for (const groupName of SHEET_GROUP_ORDER) {
        const meta = GROUP_META[groupName];
        const validSheets = (SHEET_GROUPS[groupName] || []).filter(n => findSheetByName(n));
        if (validSheets.length === 0) continue;

        html += '<div class="cat-card group-card" data-group="' + meta.key + '" '
              + 'onclick="openGroup(\'' + groupName.replace(/'/g, "\\'") + '\')">'
              + '<div class="badge-count">' + validSheets.length + '</div>'
              + '<div class="img-wrap">'
              + '<img src="../assets/fans/' + meta.img + '" alt="' + groupName + '" '
              + 'onerror="this.style.display=\'none\'">'
              + '</div>'
              + '<div class="name">' + groupName + '</div>'
              + '</div>';
      }
      grid.innerHTML = html;
    }

    // ===== ASAMA 2: MODEL GRID =====
    let _activeGroup = null;
    function openGroup(groupName) {
      _activeGroup = groupName;
      document.getElementById('stageGroups').style.display = 'none';
      document.getElementById('stageSelected').style.display = 'none';
      document.getElementById('formCard').style.display = 'none';
      document.getElementById('resultSection').style.display = 'none';
      document.getElementById('stageModels').style.display = '';

      // Breadcrumb
      const bc = document.getElementById('catBreadcrumb');
      bc.innerHTML = '<span class="crumb" onclick="renderGroupStage()">&#128193; Tum Kategoriler</span>'
                   + '<span class="sep">&rsaquo;</span>'
                   + '<span class="current">' + groupName + '</span>';

      const grid = document.getElementById('modelGrid');
      const sheetNames = SHEET_GROUPS[groupName] || [];
      let html = '';
      for (const sn of sheetNames) {
        const sheet = findSheetByName(sn);
        if (!sheet) continue;
        const imgUrl = getFanImageUrl(sn);
        const safeName = sn.replace(/'/g, "\\'");
        html += '<div class="cat-card" onclick="selectModel(\'' + safeName + '\')">'
              + '<div class="badge-count">' + (sheet.model_count || 0) + '</div>'
              + '<div class="img-wrap">'
              + '<img src="' + imgUrl + '" alt="' + sn + '" '
              + 'onerror="this.onerror=null;this.src=\'../assets/fans/default.svg\'">'
              + '</div>'
              + '<div class="name">' + sn.trim() + '</div>'
              + '</div>';
      }
      grid.innerHTML = html;

      // Yukari kaydir
      document.getElementById('categoryCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ===== ASAMA 3: MODEL SECILDI -> FORM =====
    async function selectModel(sheetName) {
      const sheet = findSheetByName(sheetName);
      if (!sheet) {
        App.showToast('Model bulunamadi', 'error');
        return;
      }

      document.getElementById('stageGroups').style.display = 'none';
      document.getElementById('stageModels').style.display = 'none';
      document.getElementById('stageSelected').style.display = '';
      document.getElementById('selectedModelName').textContent = sheetName.trim();

      // Breadcrumb
      const bc = document.getElementById('catBreadcrumb');
      bc.innerHTML = '<span class="crumb" onclick="renderGroupStage()">&#128193; Tum Kategoriler</span>'
                   + '<span class="sep">&rsaquo;</span>'
                   + '<span class="crumb" onclick="openGroup(\'' + (_activeGroup || '').replace(/'/g, "\\'") + '\')">'
                   + (_activeGroup || '') + '</span>'
                   + '<span class="sep">&rsaquo;</span>'
                   + '<span class="current">' + sheetName.trim() + '</span>';

      // Veriyi yukle
      document.getElementById('formCard').style.display = '';
      document.getElementById('resultSection').style.display = 'none';

      App.setLoading(true);
      try {
        _activeSheet = await DataLoader.loadFanSheet(sheet.file);
        _activeSheetName = sheet.name;
        _activePrices = findMatchingPrices(sheet.name);

        // Forma scroll
        setTimeout(() => {
          document.getElementById('formCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      } catch (err) {
        App.showToast('Kategori yuklenemedi: ' + err.message, 'error');
      }
      App.setLoading(false);
    }

    /**
     * Fiyat verisini getir.
     * fan_fiyatlar.json tum modelleri tek "Sayfa1" anahtarinda tutar.
     * Sheet adina bakmadan tum fiyat listesini dondur.
     */
    function findMatchingPrices(sheetName) {
      if (!_allPrices) return null;
      // Birebir eslesme dene (sheet adi ile)
      if (_allPrices[sheetName]) return _allPrices[sheetName];
      // Tum modeller tek key'de ("Sayfa1") - ilk bulunani don
      const keys = Object.keys(_allPrices);
      if (keys.length > 0) return _allPrices[keys[0]];
      return null;
    }

    // ===== GELISMIS FILTRE TOGGLE =====
    function toggleFilters() {
      const toggle = document.getElementById('filterToggle');
      const section = document.getElementById('filterSection');
      toggle.classList.toggle('open');
      section.classList.toggle('open');
    }

    // ===== FAN SEC =====
    function doSelectFan() {
      const debi = toFloat(document.getElementById('inputDebi').value);
      const basinc = toFloat(document.getElementById('inputBasinc').value);
      const iskonto = toFloat(document.getElementById('inputIskonto').value) || 0;
      const tolerans = document.getElementById('inputTolerans').checked;

      if (!debi || !basinc) {
        App.showToast('Debi ve basinc degerlerini girin', 'error');
        return;
      }

      if (!_activeSheet) {
        App.showToast('Lutfen bir kategori secin', 'error');
        return;
      }

      // Gelismis filtreler
      const filters = {
        motorGucuMin: toFloat(document.getElementById('filterMotorMin').value),
        motorGucuMax: toFloat(document.getElementById('filterMotorMax').value),
        voltaj: document.getElementById('filterVoltaj').value || null,
        sesSeviyesiMin: toFloat(document.getElementById('filterSesMin').value),
        sesSeviyesiMax: toFloat(document.getElementById('filterSesMax').value),
        devirMin: toFloat(document.getElementById('filterDevirMin').value),
        devirMax: toFloat(document.getElementById('filterDevirMax').value)
      };

      const { result, candidates, error } = FanSelector.selectFan({
        debiReq: debi,
        basincReq: basinc,
        sheetData: _activeSheet,
        priceData: _activePrices,
        filters,
        toleransAcik: tolerans,
        iskonto
      });

      if (error) {
        App.showToast(error, 'error');
        return;
      }

      _lastResult = result;
      _lastCandidates = candidates || [];

      // Sonucu goster
      renderResult(result);
      renderCandidates(_lastCandidates);

      document.getElementById('resultSection').style.display = '';

      // Sonuca scroll
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });

      playSound('click');
    }

    // ===== SONUC RENDER =====
    function renderResult(r) {
      const panel = document.getElementById('resultPanel');

      let html = '';

      // Baslik
      html += '<div class="result-title">Secilen Fan</div>';
      html += '<div class="model-name">' + r.model + '</div>';

      if (r.toleransli) {
        html += '<span class="tolerance-badge">%10 Tolerans Icinde</span>';
      }
      if (r.uyari) {
        html += '<div class="warning-text">' + r.uyari + '</div>';
      }

      // Detaylar
      html += '<div style="margin-top:16px">';
      html += resultRow('Girilen Debi', formatNumber(r.girilenDebi) + ' m&sup3;/h');
      html += resultRow('Girilen Basinc', formatNumber(r.girilenBasinc) + ' Pa');
      html += resultRow('Karsilanan Debi', formatNumber(r.debi) + ' m&sup3;/h');
      html += resultRow('Kullanilan Basinc', formatNumber(r.basinc) + ' Pa');

      if (r.motorGucu != null) html += resultRow('Motor Gucu', r.motorGucu + ' kW');
      if (r.voltaj) html += resultRow('Voltaj', r.voltaj + 'V');
      if (r.sesSeviyesi != null) html += resultRow('Ses Seviyesi', r.sesSeviyesi + ' dB');
      if (r.devir != null) html += resultRow('Devir', formatNumber(r.devir) + ' RPM');
      if (r.kontrolEkipman) html += resultRow('Kontrol Ekipman', r.kontrolEkipman);

      html += '<div style="height:1px;background:rgba(255,255,255,.1);margin:12px 0"></div>';

      html += resultRow('Liste Fiyat', formatCurrency(r.listeFiyat));
      html += resultRow('Iskonto', '%' + r.iskonto);
      html += resultRow('Net Fiyat', '<span class="highlight">' + formatCurrency(r.netFiyat) + '</span>', true);

      html += '</div>';

      panel.innerHTML = html;
    }

    function resultRow(label, value, isHighlight) {
      return '<div class="result-row">'
        + '<span class="result-label">' + label + '</span>'
        + '<span class="result-value' + (isHighlight ? ' highlight' : '') + '">' + value + '</span>'
        + '</div>';
    }

    // ===== ADAYLAR RENDER =====
    function renderCandidates(candidates) {
      const section = document.getElementById('candidatesSection');
      const tbody = document.getElementById('candidatesBody');

      if (!candidates || candidates.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = '';
      let html = '';

      for (const c of candidates) {
        const rowClass = c.selected
          ? (c.toleransli ? 'candidate-row selected-tolerance' : 'candidate-row selected-exact')
          : 'candidate-row';

        const tag = c.meets
          ? '<span class="tag tag-exact">Tam</span>'
          : '<span class="tag tag-tolerance">%10</span>';

        const safeModel = String(c.model).replace(/'/g, "\\'");
        html += '<tr class="' + rowClass + '" onclick="selectCandidate(\'' + safeModel + '\')" title="Bu modeli sec">'
          + '<td><strong>' + c.model + '</strong>' + (c.selected ? ' &#10004;' : '') + '</td>'
          + '<td>' + formatNumber(c.debi) + '</td>'
          + '<td>' + formatCurrency(c.netFiyat) + '</td>'
          + '<td>' + (c.motorGucu != null ? c.motorGucu + ' kW' : '-') + '</td>'
          + '<td>' + tag + '</td>'
          + '</tr>';
      }

      tbody.innerHTML = html;
    }

    // ===== ADAY MODELE GECIS =====
    // Tablodaki bir satira tiklayinca, o modeli secili sonuc olarak goster.
    // Girilen debi/basinc ve iskonto degisimez; sadece secilen model degisir.
    function selectCandidate(modelName) {
      if (!_lastResult || !_lastCandidates || !_lastCandidates.length) return;
      const c = _lastCandidates.find(x => x.model === modelName);
      if (!c) return;
      if (c.selected) return; // Zaten secili

      // Yeni sonuc objesi (girilen degerleri koru)
      const newResult = {
        model: c.model,
        debi: c.debi,
        basinc: _lastResult.basinc,
        girilenDebi: _lastResult.girilenDebi,
        girilenBasinc: _lastResult.girilenBasinc,
        listeFiyat: c.fiyat,
        iskonto: _lastResult.iskonto,
        netFiyat: c.netFiyat,
        motorGucu: c.motorGucu,
        kontrolEkipman: c.kontrolEkipman,
        voltaj: c.voltaj,
        sesSeviyesi: c.sesSeviyesi,
        devir: c.devir,
        toleransli: !!c.toleransli,
        uyari: null
      };

      // Adaylar icindeki "selected" bayragini guncelle
      _lastCandidates = _lastCandidates.map(x => Object.assign({}, x, {
        selected: x.model === c.model
      }));

      _lastResult = newResult;
      renderResult(newResult);
      renderCandidates(_lastCandidates);

      // Secilen sonuc paneline kaydir
      document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
      playSound('click');
    }

    // ===== DIA LISTESINE EKLE =====
    function addResultToDIA() {
      if (!_lastResult) return;
      App.addToDIA({
        modul: 'fan',
        kategori: _activeSheetName,
        model: _lastResult.model,
        debi: _lastResult.debi,
        basinc: _lastResult.basinc,
        listeFiyat: _lastResult.listeFiyat,
        iskonto: _lastResult.iskonto,
        netFiyat: _lastResult.netFiyat,
        motorGucu: _lastResult.motorGucu,
        voltaj: _lastResult.voltaj,
        toleransli: _lastResult.toleransli
      });
    }

    // ===== BASLATMA =====
    init();
  </script>
</body>
</html>
