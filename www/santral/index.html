<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <title>Santral Secimi - Point HVAC</title>
  <link rel="icon" type="image/x-icon" href="../assets/logos/yeni_icon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .motor-table { margin-top: 12px; }
    .motor-table td { font-size: .82rem; }
    .calc-card { margin-top: 16px; }
    .calc-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: .88rem; }
    .calc-label { color: rgba(255,255,255,.6); }
    .calc-value { color: #fff; font-weight: 600; }
    .calc-total { font-size: 1.1rem; color: var(--secondary); }
  </style>
</head>
<body>

  <div class="container">
    <a href="../index.html" class="back-btn" onclick="event.preventDefault(); history.back();">&#8592; Ana Sayfa</a>

    <div class="header" style="margin-bottom:20px">
      <div class="header-left">
        <div>
          <h1>&#10052;&#65039; Santral Secimi</h1>
          <div class="subtitle">Debi ile santral modeli ve invertor hesaplama</div>
        </div>
      </div>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()"><span class="theme-icon">&#9684;</span></button>
      </div>
    </div>

    <!-- Kategori -->
    <div class="card" id="categoryCard">
      <div class="card-title">Santral Kategorisi</div>
      <div id="catLoading" style="text-align:center;padding:20px;color:var(--gray-400)">
        <div class="spinner spinner-dark"></div>
      </div>
      <select class="form-select" id="categorySelect" style="display:none" onchange="onCategoryChange()"></select>
    </div>

    <!-- Form -->
    <div class="card" id="formCard" style="display:none">
      <div class="card-title">Secim Kriterleri</div>
      <div style="display:grid;gap:14px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Debi (m&sup3;/h)</label>
            <input type="number" id="inputDebi" class="form-input" step="1" placeholder="Orn: 15000" inputmode="numeric">
          </div>
          <div class="form-group">
            <label class="form-label">Iskonto (%)</label>
            <input type="number" id="inputIskonto" class="form-input" value="50" min="0" max="100" inputmode="numeric">
          </div>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="inputTolerans" checked style="width:18px;height:18px">
          <label for="inputTolerans" style="font-size:.85rem;color:var(--gray-600)">%10 Tolerans</label>
        </div>
        <button class="btn btn-primary btn-block" onclick="doSelect()">Santral Sec</button>
      </div>
    </div>

    <!-- Sonuc -->
    <div id="resultSection" style="display:none">
      <div class="result-panel" id="resultPanel"></div>
      <button class="btn btn-success btn-block btn-sm" style="margin-top:12px" onclick="addToDIA()">&#128722; DIA Listesine Ekle</button>
    </div>
  </div>

  <a href="../dia/index.html" class="dia-badge" style="display:none">&#128722;<span class="count">0</span></a>

  <script src="../js/utils.js"></script>
  <script src="../js/data-loader.js"></script>
  <script src="../js/price-calc.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // Tema
    function toggleTheme(){const h=document.documentElement,c=h.getAttribute('data-theme');let n;if(!c||c==='light')n='ozel';else if(c==='ozel')n='doga';else n='light';h.setAttribute('data-theme',n);setSetting('theme',n);const b=document.querySelector('.theme-icon');if(b){if(n==='ozel')b.innerHTML='&#127807;';else if(n==='doga')b.innerHTML='&#9728;';else b.innerHTML='&#9684;';}}
    (function(){const s=getSetting('theme','light');document.documentElement.setAttribute('data-theme',s);setTimeout(()=>{const b=document.querySelector('.theme-icon');if(b){if(s==='ozel')b.innerHTML='&#127807;';else if(s==='doga')b.innerHTML='&#9728;';else b.innerHTML='&#9684;';}},30);})();

    // Invertor fiyat tablosu (%47 iskontolu)
    const INVERTOR_TABLE = [
      [0.75, 206.25], [1.5, 229.35], [2.2, 256.85], [3, 275],
      [4, 324.90], [5.5, 397.50], [7.5, 508.25], [11, 624.75],
      [15, 888.25], [18.5, 1059], [22, 1203.70], [30, 1526.50],
      [37, 1802.90]
    ];

    function getInvertorPrice(kw) {
      for (const [size, price] of INVERTOR_TABLE) {
        if (size >= kw) return { size, price };
      }
      const last = INVERTOR_TABLE[INVERTOR_TABLE.length - 1];
      return { size: last[0], price: last[1] };
    }

    let _allData = null;
    let _motorData = null;
    let _activeSheet = null;
    let _activeSheetName = '';
    let _lastResult = null;

    async function init() {
      try {
        _allData = await DataLoader.loadSantralModels();
        _motorData = await DataLoader.loadMotorPowers();
        const sheets = Object.keys(_allData);
        renderCategories(sheets);
        App.updateDIABadge();
      } catch (e) {
        document.getElementById('catLoading').innerHTML = '<div style="color:var(--danger)">Veri yuklenemedi</div>';
      }
    }

    let _sheetKeys = [];
    function renderCategories(sheets) {
      _sheetKeys = sheets;
      document.getElementById('catLoading').style.display = 'none';
      const select = document.getElementById('categorySelect');
      select.style.display = '';
      sheets.forEach((name, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = name;
        select.appendChild(opt);
      });
      if (sheets.length) {
        _activeSheetName = sheets[0];
        _activeSheet = _allData[sheets[0]];
        document.getElementById('formCard').style.display = '';
      }
    }

    function onCategoryChange() {
      const name = _sheetKeys[document.getElementById('categorySelect').value];
      _activeSheetName = name;
      _activeSheet = _allData[name];
      document.getElementById('formCard').style.display = '';
      document.getElementById('resultSection').style.display = 'none';
    }

    function doSelect() {
      const debiReq = toFloat(document.getElementById('inputDebi').value);
      const iskonto = toFloat(document.getElementById('inputIskonto').value) || 0;
      const tolerans = document.getElementById('inputTolerans').checked;
      if (!debiReq) { App.showToast('Debi degeri girin', 'error'); return; }
      if (!_activeSheet || !_activeSheet.length) { App.showToast('Bu kategoride veri yok', 'error'); return; }

      // Modelleri debi ve fiyata gore sirala
      const sorted = [..._activeSheet].filter(m => m.debi != null).sort((a, b) => (a.debi - b.debi) || ((a.fiyat || 0) - (b.fiyat || 0)));
      if (!sorted.length) { App.showToast('Model bulunamadi', 'error'); return; }

      let selected = null;
      let matchType = '';

      // 1. Tam eslesme
      const exact = sorted.find(m => Math.abs(m.debi - debiReq) < 1);
      if (exact) { selected = exact; matchType = 'Tam Eslesme'; }

      // 2. Toleransli
      if (!selected && tolerans) {
        const threshold = debiReq * 0.9;
        const inRange = sorted.filter(m => m.debi >= threshold && m.debi <= debiReq * 1.1);
        if (inRange.length) {
          inRange.sort((a, b) => Math.abs(a.debi - debiReq) - Math.abs(b.debi - debiReq));
          selected = inRange[0];
          matchType = 'Toleransli (%10)';
        }
      }

      // 3. En kucuk karsilayan
      if (!selected) {
        const bigger = sorted.find(m => m.debi >= debiReq);
        if (bigger) { selected = bigger; matchType = 'Ust Model'; }
      }

      // 4. En buyuk
      if (!selected) {
        selected = sorted[sorted.length - 1];
        matchType = 'En Buyuk Model';
      }

      // Motor verileri
      const motors = findMotors(selected.model);
      let invertorTotal = 0;
      const motorDetails = motors.map(m => {
        const inv = getInvertorPrice(m.guc || 0);
        const adet = m.adet || 1;
        const tutar = inv.price * adet;
        invertorTotal += tutar;
        return { ...m, invertorSize: inv.size, invertorFiyat: inv.price, tutar };
      });

      const otomasyonTotal = invertorTotal + 3000;
      const listeFiyat = selected.fiyat || 0;
      const netFiyat = PriceCalc.applyDiscount(listeFiyat, iskonto);

      _lastResult = {
        model: selected.model,
        debi: selected.debi,
        girilenDebi: debiReq,
        listeFiyat, iskonto, netFiyat,
        matchType, motorDetails, invertorTotal, otomasyonTotal,
        sheetName: _activeSheetName
      };

      renderResult();
      document.getElementById('resultSection').style.display = '';
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
      playSound('click');
    }

    function findMotors(modelName) {
      if (!_motorData) return [];
      for (const key of Object.keys(_motorData)) {
        const items = _motorData[key];
        const found = items.filter(m => m.santral_adi && m.santral_adi.trim() === modelName.trim());
        if (found.length) return found;
      }
      return [];
    }

    function renderResult() {
      const r = _lastResult;
      const p = document.getElementById('resultPanel');
      let h = '<div class="result-title">Secilen Santral</div>';
      h += '<div style="font-size:1.4rem;font-weight:800;color:var(--secondary);margin-bottom:4px">' + r.model + '</div>';
      h += '<div style="font-size:.78rem;color:rgba(255,255,255,.4);margin-bottom:12px">' + r.matchType + '</div>';

      h += '<div class="result-row"><span class="result-label">Girilen Debi</span><span class="result-value">' + formatNumber(r.girilenDebi) + ' m&sup3;/h</span></div>';
      h += '<div class="result-row"><span class="result-label">Karsilanan Debi</span><span class="result-value">' + formatNumber(r.debi) + ' m&sup3;/h</span></div>';
      h += '<div class="result-row"><span class="result-label">Liste Fiyat</span><span class="result-value">' + formatCurrency(r.listeFiyat) + '</span></div>';
      h += '<div class="result-row"><span class="result-label">Iskonto</span><span class="result-value">%' + r.iskonto + '</span></div>';
      h += '<div class="result-row"><span class="result-label">Net Fiyat</span><span class="result-value highlight">' + formatCurrency(r.netFiyat) + '</span></div>';

      // Motor ve invertor
      if (r.motorDetails.length) {
        h += '<div style="height:1px;background:rgba(255,255,255,.1);margin:12px 0"></div>';
        h += '<div style="font-size:.9rem;font-weight:700;color:var(--secondary);margin-bottom:8px">Motor & Invertor</div>';
        for (const m of r.motorDetails) {
          h += '<div class="result-row"><span class="result-label">' + (m.islev || 'Motor') + ' (' + (m.guc || '-') + ' kW x' + (m.adet || 1) + ')</span>';
          h += '<span class="result-value">' + formatCurrency(m.tutar) + '</span></div>';
        }
        h += '<div class="result-row"><span class="result-label">Invertor Toplam</span><span class="result-value">' + formatCurrency(r.invertorTotal) + '</span></div>';
        h += '<div class="result-row"><span class="result-label">Otomasyon (+3000 EUR)</span><span class="result-value highlight">' + formatCurrency(r.otomasyonTotal) + '</span></div>';
      }

      p.innerHTML = h;
    }

    function addToDIA() {
      if (!_lastResult) return;
      App.addToDIA({
        modul: 'santral', kategori: _lastResult.sheetName,
        model: _lastResult.model, debi: _lastResult.debi,
        listeFiyat: _lastResult.listeFiyat, iskonto: _lastResult.iskonto,
        netFiyat: _lastResult.netFiyat, invertorTotal: _lastResult.invertorTotal,
        otomasyonTotal: _lastResult.otomasyonTotal
      });
    }

    init();
  </script>
</body>
</html>
